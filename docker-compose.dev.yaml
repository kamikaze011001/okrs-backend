version: '3.8'

services:
  app:
    image: okrs-app:latest
    container_name: okrs-service
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-okrs_db}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_ACCESS_TOKEN_SECRET=${JWT_ACCESS_TOKEN_SECRET}
      - JWT_ACCESS_TOKEN_LIFETIME=${JWT_ACCESS_TOKEN_LIFETIME:-900000}
      - JWT_REFRESH_TOKEN_SECRET=${JWT_REFRESH_TOKEN_SECRET}
      - JWT_REFRESH_TOKEN_LIFETIME=${JWT_REFRESH_TOKEN_LIFETIME:-86400000}
      - SPRING_EMAIL_FROM=${SPRING_EMAIL_FROM}
      - SPRING_EMAIL_USERNAME=${SPRING_EMAIL_USERNAME}
      - SPRING_EMAIL_PASSWORD=${SPRING_EMAIL_PASSWORD}
      - FILE_STORAGE_PATH=${FILE_STORAGE_PATH:-/app/uploads}
    volumes:
      - app_uploads:/app/uploads
    networks:
      - okrs_network

  postgres:
    image: postgres:15-alpine
    container_name: okrs-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-okrs_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - okrs_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-okrs_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: okrs-redis
    ports:
      - "6379:6379"
    command: /bin/sh -c 'redis-server --requirepass ${REDIS_PASSWORD}'
    volumes:
      - redis_data:/data
    networks:
      - okrs_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  okrs_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  app_uploads: