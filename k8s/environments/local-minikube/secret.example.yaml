apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque
stringData:
  # ==========================================
  # DATABASE (Postgres)
  # ==========================================
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/okrs_db"

  # CHANGED: Now using POSTGRES_NAME as requested
  POSTGRES_USER: "okrs_admin"
  POSTGRES_PASSWORD: "my_secure_db_password"

  # ==========================================
  # REDIS
  # ==========================================
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "my_secure_redis_password"

  # ==========================================
  # JWT AUTHENTICATION
  # ==========================================
  JWT_ACCESS_TOKEN_SECRET: "make_sure_this_is_a_very_long_random_string_for_security"
  JWT_ACCESS_TOKEN_LIFETIME: "86400000"
  JWT_REFRESH_TOKEN_SECRET: "another_very_long_random_string_for_refreshing"
  JWT_REFRESH_TOKEN_LIFETIME: "604800000"

  # ==========================================
  # EMAIL (SMTP)
  # ==========================================
  SPRING_EMAIL_FROM: "no-reply@yourdomain.com"
  SPRING_EMAIL_USERNAME: "your-email@gmail.com"
  SPRING_EMAIL_PASSWORD: "your_gmail_app_password"