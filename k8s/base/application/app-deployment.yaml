apiVersion: apps/v1
kind: Deployment
metadata:
  name: okrs-app-deployment
  labels:
    app: okrs-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: okrs-app
  template:
    metadata:
      labels:
        app: okrs-app
    spec:
      containers:
        - name: okrs-app-container
          image: okrs-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          volumeMounts:
            - name: upload-data
              mountPath: /app/uploads
      volumes:
        - name: upload-data
          persistentVolumeClaim:
            claimName: upload-data-pvc